<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة التخدير - اختبار العناية المركزة العصبية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{
            text-decoration: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* أنماط أساسية */
        :root {
            /* Base typography scale: change --base-font-size to adjust whole UI */
            --base-font-size: 16px; /* sensible default for desktop */
            --primary-color: #6a1b9a;
            --secondary-color: #9c27b0;
            --text-color: #2d3748;
            --light-color: #f8fafc;
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        /* Set base font-size on the root so rem and clamp values scale predictably */
        html {
            font-size: var(--base-font-size);
            -webkit-text-size-adjust: 100%; /* prevent iOS from auto-scaling text */
        }

        [data-theme="dark"] {
            --primary-color: #9c27b0;
            --secondary-color: #ba68c8;
            --text-color: #f7fafc;
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --border-color: #4a5568;
            --light-color: #2d3748;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            line-height: 1.6;
            font-family: 'Tajawal', sans-serif;
            /* Use rem-based sizing so components (using clamp/rem) are consistent */
            font-size: 1rem; /* equals --base-font-size (16px by default) */
            min-height: 100vh;
        }

        /* أنماط شريط التنقل */
        .navbar {
            background-color: var(--bg-color);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 700;
            font-size: clamp(1.2rem, 4vw, 1.7rem);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .logo:hover {
            transform: translateY(-2px);
        }

        .logo i {
            margin-left: 0.5rem;
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--primary-color);
        }

        .logo-text {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 4px 10px rgba(106, 27, 154, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #7b1fa2, #8e24aa);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(106, 27, 154, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-outline:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.8rem;
            transition: var(--transition);
            padding: 0.5rem;
        }

        .hamburger:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* قائمة الجوال */
        .mobile-menu {
            display: none;
            background-color: var(--card-bg);
            padding: 1.5rem 1rem;
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease-out;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mobile-menu.active {
            display: block;
        }

        .mobile-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-direction: column;
            width: 100%;
        }

        .mobile-buttons .btn {
            width: 100%;
            justify-content: center;
        }

        /* المحتوى الرئيسي */
        .main-content {
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .hero {
            text-align: center;
            padding: 2rem 0;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.3;
        }

        .hero p {
            font-size: clamp(1rem, 3vw, 1.1rem);
            max-width: 700px;
            margin: 0 auto 2rem;
            color: var(--text-color);
            line-height: 1.6;
        }

        /* أنماط الاختبار */
        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: var(--shadow);
            border-top: 4px solid var(--primary-color);
            width: 100%;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .question-number {
            font-size: clamp(1.1rem, 3vw, 1.2rem);
            color: var(--primary-color);
            font-weight: 600;
        }

        .quiz-timer {
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: 600;
            color: var(--text-color);
        }

        .quiz-progress {
            background-color: var(--light-color);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            width: 100%;
        }

        .quiz-progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .question-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .question-text {
            font-size: clamp(1.1rem, 3.5vw, 1.3rem);
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.5;
            text-align: left;
            direction: ltr;
            flex: 1;
        }

        .help-icon {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            font-size: 1.1rem;
        }

        .help-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .explanation {
            background-color: var(--light-color);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            border-right: 4px solid var(--primary-color);
            display: none;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            line-height: 1.6;
            text-align: left;
            direction: ltr;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .page-reference {
            display: block;
            margin-top: 0.5rem;
            font-style: italic;
            color: var(--secondary-color);
            font-weight: 500;
            text-align: left;
            direction: ltr;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option {
            background-color: var(--light-color);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            text-align: left;
            direction: ltr;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            line-height: 1.4;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background-color: var(--border-color);
            transform: translateY(-2px);
        }

        .option.selected {
            border-color: var(--primary-color);
            background-color: rgba(106, 27, 154, 0.1);
        }

        .option.correct {
            border-color: #4caf50;
            background-color: rgba(76, 175, 80, 0.1);
        }

        .option.incorrect {
            border-color: #f44336;
            background-color: rgba(244, 67, 54, 0.1);
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .feedback-message {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            font-size: clamp(1rem, 3vw, 1.1rem);
            animation: fadeIn 0.3s ease;
        }

        .feedback-correct {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .feedback-incorrect {
            background-color: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }

        .quiz-actions {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .quiz-actions .btn {
            flex: 1;
            min-width: 140px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            padding: 0.8rem 1rem;
        }

        .result-container {
            text-align: center;
            padding: 1.5rem;
        }

        .result-score {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            color: var(--primary-color);
            margin: 1rem 0;
        }

        .result-message {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .result-actions .btn {
            min-width: 160px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            padding: 0.8rem 1.5rem;
        }

        .detailed-results {
            margin-top: 2rem;
            text-align: right;
        }

        .detailed-results h3 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .question-review {
            background-color: var(--light-color);
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-right: 4px solid var(--border-color);
        }

        .question-review.correct {
            border-right-color: #4caf50;
        }

        .question-review.incorrect {
            border-right-color: #f44336;
        }

        .review-question {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: clamp(1rem, 3vw, 1.1rem);
            text-align: left;
            direction: ltr;
            line-height: 1.5;
        }

        .review-answer {
            margin: 0.5rem 0;
            padding: 0.8rem;
            border-radius: 6px;
            text-align: right;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            line-height: 1.4;
        }

        .user-answer {
            background-color: rgba(59, 130, 246, 0.1);
            border-right: 3px solid #3b82f6;
        }

        .correct-answer {
            background-color: rgba(34, 197, 94, 0.1);
            border-right: 3px solid #22c55e;
        }

        .answer-status {
            display: inline-block;
            margin-right: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .answer-status.correct {
            color: #22c55e;
        }

        .answer-status.incorrect {
            color: #ef4444;
        }

        .test-history {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            margin-top: 2rem;
            box-shadow: var(--shadow);
            width: 100%;
        }

        .test-history h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-date {
            color: var(--text-color);
            font-size: clamp(0.9rem, 2.5vw, 1rem);
        }

        .history-score {
            font-weight: 600;
            color: var(--primary-color);
            font-size: clamp(0.9rem, 2.5vw, 1rem);
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .download-btn .btn {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            padding: 0.8rem 1.5rem;
        }

        /* زر تبديل الوضع الداكن/الفاتح */
        .theme-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }

        #themeToggle {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            font-size: 1.2rem;
        }

        #themeToggle:hover {
            transform: scale(1.1);
        }

        /* أنماط متجاوبة */
        /* هواتف صغيرة - أقل من 576px */
        @media (max-width: 575.98px) {
            .navbar-container {
                padding: 0.7rem 0.8rem;
            }
            
            .logo {
                font-size: 1.1rem;
            }
            
            .logo i {
                font-size: 1.3rem;
                margin-left: 0.3rem;
            }
            
            .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
            }
            
            .main-content {
                padding: 1.5rem 0.8rem;
            }
            
            .hero {
                padding: 1.5rem 0;
            }
            
            .quiz-container {
                padding: 1rem;
            }
            
            .question-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
            }
            
            .help-icon {
                align-self: flex-end;
            }
            
            .quiz-actions {
                flex-direction: column;
            }
            
            .quiz-actions .btn {
                width: 100%;
            }
            
            .result-actions {
                flex-direction: column;
            }
            
            .result-actions .btn {
                width: 100%;
            }
            
            .history-item {
                flex-direction: column;
                text-align: center;
            }
        }

        /* هواتف متوسطة - 576px إلى 767px */
        @media (min-width: 576px) and (max-width: 767.98px) {
            .navbar-container {
                padding: 0.7rem 1rem;
            }
            
            .main-content {
                padding: 1.5rem 1rem;
            }
            
            .quiz-container {
                padding: 1.2rem;
            }
        }

        /* أجهزة لوحية - 768px إلى 991px */
        @media (min-width: 768px) and (max-width: 991.98px) {
            .navbar-container {
                padding: 0.8rem 1.5rem;
            }
            
            .main-content {
                padding: 2rem 1.5rem;
            }
            
            .quiz-container {
                padding: 1.5rem;
            }
        }

        /* لابتوب - 992px إلى 1199px */
        @media (min-width: 992px) and (max-width: 1199.98px) {
            .navbar-container {
                padding: 0.8rem 2rem;
            }
            
            .main-content {
                padding: 2rem 1.5rem;
            }
        }

        /* شاشات كبيرة - 1200px فما فوق */
        @media (min-width: 1200px) {
            .navbar-container {
                padding: 0.8rem 2rem;
            }
            
            .main-content {
                padding: 3rem 2rem;
            }
        }

        /* إخفاء قائمة الجوال في الشاشات الكبيرة */
        @media (min-width: 993px) {
            .mobile-menu {
                display: none !important;
            }
            
            .hamburger {
                display: none !important;
            }
        }

        /* إظهار قائمة الجوال في الشاشات الصغيرة */
        @media (max-width: 992px) {
            .nav-buttons {
                display: none;
            }

            .hamburger {
                display: block;
            }
        }

        /* تحسينات للشاشات الصغيرة جدًا */
        @media (max-width: 360px) {
            .logo-text {
                font-size: 1rem;
            }
            
            .btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.8rem;
            }
            
            .question-text {
                font-size: 1rem;
            }
            
            .option {
                padding: 0.8rem;
                font-size: 0.85rem;
            }
        }

        /* منع التكبير التلقائي على iOS */
        @supports (-webkit-touch-callout: none) {
            input, select, textarea {
                font-size: 16px;
            }
        }

        /* تحسين الأداء على الأجهزة المحمولة */
        @media (hover: none) {
            .option:hover {
                transform: none;
                background-color: var(--light-color);
            }
            
            .btn:hover {
                transform: none;
            }
            
            .help-icon:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="logo">
                <i class="fas fa-book-medical"></i>
                <span class="logo-text">موسوعة التخدير</span>
            </a>
            
            <div class="nav-buttons">
                <a href="https://t.me/Anesthesia_Mohd" target="_blank" class="btn btn-primary">
                    <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                    تواصل معنا
                </a>
            </div>
            
            <button class="hamburger">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <div class="mobile-menu">
            <div class="mobile-buttons">
                <a href="https://t.me/Anesthesia_Mohd" target="_blank" class="btn btn-primary">
                    <i class="fas fa-paper-plane" style="margin-left: 8px;"></i>
                    تواصل معنا
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero">
            <h1>اختبار العناية المركزة العصبية (Neurocritical Care)</h1>
            <p>اختبر معرفتك في العناية المركزة العصبية من خلال 50 سؤالاً شاملاً </p>
            <div class="download-btn">
                <button id="downloadPdf" class="btn btn-outline">
                    <i class="fas fa-download" style="margin-left: 8px;"></i>
                    تحميل الأسئلة بصيغة PDF
                </button>
            </div>
        </section>

        <section class="quiz-container" id="quiz-section">
            <!-- سيتم ملء هذا القسم ديناميكيًا بواسطة JavaScript -->
        </section>

        <section class="test-history" id="history-section">
            <h3>سجل الاختبارات السابقة</h3>
            <div id="history-list">
                <!-- سيتم ملء هذا القسم ديناميكيًا بواسطة JavaScript -->
            </div>
        </section>
    </main>

    <!-- زر تبديل الوضع الداكن/الفاتح -->
    <div class="theme-switcher">
        <button id="themeToggle" aria-label="تبديل الوضع الداكن">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun" style="display:none;"></i>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // تبديل القائمة المتنقلة
            const hamburger = document.querySelector('.hamburger');
            const mobileMenu = document.querySelector('.mobile-menu');
            
            hamburger.addEventListener('click', function() {
                mobileMenu.classList.toggle('active');
                
                const icon = hamburger.querySelector('i');
                if (mobileMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
            
            // تبديل الوضع الداكن/الفاتح
            const themeToggle = document.getElementById('themeToggle');
            const moonIcon = themeToggle.querySelector('.fa-moon');
            const sunIcon = themeToggle.querySelector('.fa-sun');
            
            // التحقق من التفضيل المحفوظ أو تفضيل النظام

                    question: "What is the recommended tidal volume for lung-protective ventilation in neurogenic pulmonary edema?",
                    options: [
                        "4-5 mL/kg",
                        "6-8 mL/kg",
                        "8-10 mL/kg",
                        "10-12 mL/kg",
                        "12-15 mL/kg"
                    ],
                    correctAnswer: 1,
                    explanation: "Lung-protective ventilation with tidal volume 6-8 mL/kg is recommended for neurogenic pulmonary edema management, along with high PEEP (8-12 cm H₂O).",
                    pageReference: "Page 21 - Neurogenic Pulmonary Edema Management"
                },
                {
                    question: "Which medication is used for tachycardia in neurocardiac syndrome?",
                    options: [
                        "Atropine",
                        "β-blockers (metoprolol)",
                        "Epinephrine",
                        "Dobutamine",
                        "Isoproterenol"
                    ],
                    correctAnswer: 1,
                    explanation: "Management of neurocardiac syndrome includes: β-blockers (metoprolol) for tachycardia, avoid excessive fluid if stunned myocardium present, and inotropes (dobutamine) if cardiogenic shock develops.",
                    pageReference: "Page 21 - Management of neurocardiac syndrome"
                },
                {
                    question: "What is the recommended dose for hypertonic saline (3%) as osmotherapy?",
                    options: [
                        "100 mL IV bolus",
                        "150 mL IV bolus",
                        "200 mL IV bolus",
                        "250 mL IV bolus",
                        "300 mL IV bolus"
                    ],
                    correctAnswer: 3,
                    explanation: "Hypertonic saline (3%) 250 mL intravenous bolus is used as osmotherapy in Step 3 of ICP management, along with Mannitol 0.25-1 g/kg IV bolus.",
                    pageReference: "Page 14 - ICP Management Algorithm"
                },
                {
                    question: "All of the following are components of the Sedation Management Bundle EXCEPT:",
                    options: [
                        "Daily sedation vacation",
                        "Pain assessment every 2 hours",
                        "Delirium screening using CAM-ICU",
                        "Continuous sedation without interruption",
                        "All are components"
                    ],
                    correctAnswer: 3,
                    explanation: "Sedation Management Bundle includes: Daily sedation vacation, Pain assessment every 2 hours, and Delirium screening using CAM-ICU. Continuous sedation without interruption is not recommended.",
                    pageReference: "Page 28 - Sedation Management Bundle"
                },
                {
                    question: "What is the final step (Step 6) in the ICP Management Algorithm?",
                    options: [
                        "CSF drainage",
                        "Hyperventilation",
                        "Barbiturate coma (pentobarbital)",
                        "Osmotherapy",
                        "Decompressive craniectomy"
                    ],
                    correctAnswer: 2,
                    explanation: "Step 6: Barbiturate coma (pentobarbital) for refractory cases. This is after Step 1: Positioning, Step 2: Sedation, Step 3: Osmotherapy, Step 4: CSF drainage, and Step 5: Hyperventilation.",
                    pageReference: "Page 14 - ICP Management Algorithm"
                }
            ];

            // متغيرات حالة الاختبار
            let currentQuestionIndex = 0;
            let userAnswers = Array(questions.length).fill(null);
            let answeredQuestions = Array(questions.length).fill(false);
            
            // مفتاح التمييز للاختبارات الجديدة
            const NEW_TEST_KEY = 'neurocritical_care_50_questions';
            let testHistory = JSON.parse(localStorage.getItem('testHistory')) || [];
            let testInProgress = localStorage.getItem('testInProgress') === 'true';
            let currentTestStartTime = localStorage.getItem('currentTestStartTime');

            // تصفية الاختبارات القديمة والاحتفاظ بالجديدة فقط
            function filterNewTests() {
                return testHistory.filter(test => test.testKey === NEW_TEST_KEY);
            }

            // تهيئة الاختبار
            function initQuiz() {
                // إذا كان هناك اختبار قيد التقدم، استعادة الحالة
                if (testInProgress && currentTestStartTime) {
                    const savedAnswers = localStorage.getItem('userAnswers');
                    if (savedAnswers) {
                        userAnswers = JSON.parse(savedAnswers);
                    }
                    
                    const savedAnswered = localStorage.getItem('answeredQuestions');
                    if (savedAnswered) {
                        answeredQuestions = JSON.parse(savedAnswered);
                    }
                    
                    const savedIndex = localStorage.getItem('currentQuestionIndex');
                    if (savedIndex) {
                        currentQuestionIndex = parseInt(savedIndex);
                    }
                    
                    showQuestion();
                } else {
                    // بدء اختبار جديد
                    startNewTest();
                }
                
                // عرض سجل الاختبارات الجديدة فقط
                displayTestHistory();
            }

            // بدء اختبار جديد
            function startNewTest() {
                currentQuestionIndex = 0;
                userAnswers = Array(questions.length).fill(null);
                answeredQuestions = Array(questions.length).fill(false);
                testInProgress = true;
                currentTestStartTime = new Date().toISOString();
                
                // حفظ حالة الاختبار
                localStorage.setItem('testInProgress', 'true');
                localStorage.setItem('currentTestStartTime', currentTestStartTime);
                localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
                localStorage.setItem('answeredQuestions', JSON.stringify(answeredQuestions));
                localStorage.setItem('currentQuestionIndex', currentQuestionIndex.toString());
                
                showQuestion();
            }

            // عرض السؤال الحالي
            function showQuestion() {
                const quizSection = document.getElementById('quiz-section');
                const question = questions[currentQuestionIndex];
                
                // إنشاء تقدم الاختبار
                const answeredCount = answeredQuestions.filter(v => v === true).length;
                const progressPercentage = (answeredCount / questions.length) * 100;
                
                quizSection.innerHTML = `
                    <div class="quiz-header">
                        <div class="question-number">سؤال ${currentQuestionIndex + 1} من ${questions.length}</div>
                        <div class="quiz-timer" id="quiz-timer">الوقت: 00:00</div>
                    </div>
                    <div class="quiz-progress">
                        <div class="quiz-progress-bar" style="width: ${progressPercentage}%"></div>
                    </div>
                    <div class="question-container">
                        <div class="question-header">
                            <div class="question-text">${question.question}</div>
                            <div class="help-icon" title="اضغط للشرح">
                                <i class="fas fa-lightbulb"></i>
                            </div>
                        </div>
                        <div class="explanation" id="explanation">
                            ${question.explanation}
                            <div class="page-reference">${question.pageReference}</div>
                        </div>
                        <div class="options-container" id="options-container">
                            ${question.options.map((option, index) => `
                                <div class="option ${answeredQuestions[currentQuestionIndex] ? (userAnswers[currentQuestionIndex] === index ? (index === question.correctAnswer ? 'correct' : 'incorrect') : '') : ''} ${answeredQuestions[currentQuestionIndex] ? 'disabled' : ''}" data-index="${index}">
                                    ${String.fromCharCode(65 + index)}) ${option}
                                </div>
                            `).join('')}
                        </div>
                        ${answeredQuestions[currentQuestionIndex] ? `
                            <div class="feedback-message ${userAnswers[currentQuestionIndex] === question.correctAnswer ? 'feedback-correct' : 'feedback-incorrect'}">
                                ${userAnswers[currentQuestionIndex] === question.correctAnswer ? 
                                    '✓ إجابة صحيحة! سيتم الانتقال إلى السؤال التالي...' : 
                                    '✗ إجابة خاطئة. الإجابة الصحيحة هي: ' + String.fromCharCode(65 + question.correctAnswer) + ') ' + question.options[question.correctAnswer]}
                            </div>
                        ` : ''}
                    </div>
                `;
                
                // إضافة حدث النقر لأيقونة الشرح
                document.querySelector('.help-icon').addEventListener('click', function() {
                    const explanation = document.getElementById('explanation');
                    explanation.classList.toggle('show');
                });
                
                // إضافة أحداث النقر للخيارات فقط إذا لم يتم الإجابة بعد
                if (!answeredQuestions[currentQuestionIndex]) {
                    document.querySelectorAll('.option').forEach(option => {
                        option.addEventListener('click', function() {
                            const selectedIndex = parseInt(this.getAttribute('data-index'));
                            handleAnswer(selectedIndex);
                        });
                    });
                }
                
                // بدء المؤقت
                startTimer();
            }

            // معالجة الإجابة
            function handleAnswer(selectedIndex) {
                const question = questions[currentQuestionIndex];
                const isCorrect = selectedIndex === question.correctAnswer;
                
                // حفظ الإجابة
                userAnswers[currentQuestionIndex] = selectedIndex;
                answeredQuestions[currentQuestionIndex] = true;
                
                // تحديث localStorage
                localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
                localStorage.setItem('answeredQuestions', JSON.stringify(answeredQuestions));
                
                // تحديث عرض السؤال مع الإجابة
                showQuestion();
                
                // التحقق مما إذا كان هذا هو السؤال الأخير
                const answeredCount = answeredQuestions.filter(v => v === true).length;
                if (answeredCount === questions.length) {
                    // تأخير الانتقال إلى النتائج لعرض رسالة الإجابة
                    setTimeout(() => {
                        finishTest();
                    }, 2000);
                } else {
                    // الانتقال إلى السؤال التالي تلقائياً بعد ثانيتين
                    setTimeout(() => {
                        // العثور على السؤال التالي غير المجاب عليه
                        let nextIndex = currentQuestionIndex + 1;
                        while (nextIndex < questions.length && answeredQuestions[nextIndex]) {
                            nextIndex++;
                        }
                        
                        if (nextIndex < questions.length) {
                            currentQuestionIndex = nextIndex;
                            localStorage.setItem('currentQuestionIndex', currentQuestionIndex.toString());
                            showQuestion();
                        } else {
                            // إذا لم يتم العثور على سؤال تالي غير مجاب عليه، عرض النتائج
                            finishTest();
                        }
                    }, 2000);
                }
            }

            // إنهاء الاختبار وعرض النتائج
            function finishTest() {
                testInProgress = false;
                localStorage.setItem('testInProgress', 'false');
                
                // حساب النتيجة
                let score = 0;
                questions.forEach((question, index) => {
                    if (userAnswers[index] === question.correctAnswer) {
                        score++;
                    }
                });
                
                const percentage = (score / questions.length) * 100;
                
                // حفظ النتيجة في السجل مع مفتاح التمييز
                const testResult = {
                    date: new Date().toLocaleDateString('en-US'),
                    score: score,
                    total: questions.length,
                    percentage: percentage.toFixed(1),
                    testKey: NEW_TEST_KEY // إضافة مفتاح التمييز للاختبارات الجديدة
                };
                
                testHistory.unshift(testResult);
                localStorage.setItem('testHistory', JSON.stringify(testHistory));
                
                // عرض النتائج
                showResults(score, percentage);
            }

            // عرض نتائج الاختبار
            function showResults(score, percentage) {
                const quizSection = document.getElementById('quiz-section');
                
                let message = "";
                if (percentage >= 90) {
                    message = "ممتاز! أداء رائع في العناية المركزة العصبية.";
                } else if (percentage >= 80) {
                    message = "جيد جداً! معرفة قوية بمبادئ العناية المركزة العصبية.";
                } else if (percentage >= 70) {
                    message = "جيد! تحتاج لمراجعة بعض المفاهيم.";
                } else if (percentage >= 60) {
                    message = "مقبول! يوصى بمراجعة المواد الدراسية.";
                } else {
                    message = "ضعيف! يجب عليك مراجعة العناية المركزة العصبية بشكل مكثف.";
                }
                
                // إنشاء عرض تفصيلي للنتائج
                let detailedResults = '';
                questions.forEach((question, index) => {
                    const userAnswer = userAnswers[index];
                    const isCorrect = userAnswer === question.correctAnswer;
                    const userAnswerText = userAnswer !== null ? question.options[userAnswer] : "لم يتم الإجابة";
                    const correctAnswerText = question.options[question.correctAnswer];
                    
                    detailedResults += `
                        <div class="question-review ${isCorrect ? 'correct' : 'incorrect'}">
                            <div class="review-question">${index + 1}. ${question.question}</div>
                            <div class="review-answer user-answer">
                                <span class="answer-status ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓' : '✗'}</span>
                                <strong>إجابتك:</strong> ${userAnswerText}
                            </div>
                            ${!isCorrect ? `
                                <div class="review-answer correct-answer">
                                    <span class="answer-status correct">✓</span>
                                    <strong>الإجابة الصحيحة:</strong> ${correctAnswerText}
                                </div>
                            ` : ''}
                            <div class="page-reference">${question.pageReference}</div>
                        </div>
                    `;
                });
                
                quizSection.innerHTML = `
                    <div class="result-container">
                        <h2>نتيجة الاختبار - العناية المركزة العصبية</h2>
                        <div class="result-score">${score}/${questions.length}</div>
                        <div class="result-score">${percentage.toFixed(1)}%</div>
                        <div class="result-message">${message}</div>
                        <div class="result-actions">
                            <button class="btn btn-primary" id="restart-btn">
                                <i class="fas fa-redo" style="margin-left: 8px;"></i>
                                إعادة الاختبار
                            </button>
                            <button class="btn btn-outline" id="share-btn">
                                <i class="fab fa-telegram" style="margin-left: 8px;"></i>
                                مشاركة النتيجة
                            </button>
                        </div>
                        <div class="detailed-results">
                            <h3>التفاصيل الكاملة للإجابات</h3>
                            ${detailedResults}
                        </div>
                    </div>
                `;
                
                // إضافة أحداث النقر للأزرار
                document.getElementById('restart-btn').addEventListener('click', startNewTest);
                document.getElementById('share-btn').addEventListener('click', shareResult);
                
                // تحديث سجل الاختبارات
                displayTestHistory();
            }

            // مشاركة النتيجة على Telegram
            function shareResult() {
                const score = userAnswers.filter((answer, index) => 
                    answer === questions[index].correctAnswer
                ).length;
                
                const percentage = (score / questions.length) * 100;
                
                const shareText = `حصلت على ${score}/${questions.length} (${percentage.toFixed(1)}%) في اختبار العناية المركزة العصبية!\n\nموقع موسوعة التخدير:\nhttps://mohamed58902.github.io/Encyclopedia-of-Anesthesia/`;
                const telegramUrl = `https://t.me/share/url?url=${encodeURIComponent('https://mohamed58902.github.io/Encyclopedia-of-Anesthesia/')}&text=${encodeURIComponent(shareText)}`;
                
                window.open(telegramUrl, '_blank');
            }

            // بدء المؤقت
            function startTimer() {
                const timerElement = document.getElementById('quiz-timer');
                let startTime = currentTestStartTime ? new Date(currentTestStartTime) : new Date();
                
                function updateTimer() {
                    const currentTime = new Date();
                    const elapsedTime = Math.floor((currentTime - startTime) / 1000);
                    const minutes = Math.floor(elapsedTime / 60);
                    const seconds = elapsedTime % 60;
                    
                    timerElement.textContent = `الوقت: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
                
                updateTimer();
                const timerInterval = setInterval(updateTimer, 1000);
                
                // تنظيف المؤقت عند إنهاء الاختبار
                if (!testInProgress) {
                    clearInterval(timerInterval);
                }
            }

            // عرض سجل الاختبارات (الجديدة فقط)
            function displayTestHistory() {
                const historyList = document.getElementById('history-list');
                const newTests = filterNewTests();
                
                if (newTests.length === 0) {
                    historyList.innerHTML = '<p style="text-align: center; color: var(--text-color); opacity: 0.7;">لا توجد اختبارات سابقة</p>';
                    return;
                }
                
                historyList.innerHTML = newTests.map(test => `
                    <div class="history-item">
                        <span class="history-date">${test.date}</span>
                        <span class="history-score">${test.score}/${test.total} (${test.percentage}%)</span>
                    </div>
                `).join('');
            }

            // تحميل الأسئلة كملف PDF - فتح الرابط المطلوب
            document.getElementById('downloadPdf').addEventListener('click', function() {
                window.open('https://drive.google.com/file/d/1kLu_vn6FR50LPJJHwhUiBZfb2mpuzGbT/view?usp=sharing', '_blank');
            });

            // تهيئة الاختبار عند تحميل الصفحة
            initQuiz();
        });
    </script>
</body>
</html>
